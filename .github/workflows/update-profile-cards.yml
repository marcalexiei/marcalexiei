name: Update profile cards

on:
  schedule:
    - cron: '0 0 * * 0' # Run every week on Sunday at midnight

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build profile cards and open PR

    runs-on: ubuntu-latest

    environment: cards-updater

    permissions:
      contents: write # push generated SVGs and branch
      pull-requests: write # open and manage the update PR

    env:
      DARK_CARD: profile/stats-dark.svg
      LIGHT_CARD: profile/stats-light.svg

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup credentials
        id: credentials
        uses: marcalexiei/github-actions/setup-github-app-user-bot@35654007fc916287603cd114516a3d1295f62689 # v2.0.0
        with:
          app-id: ${{ vars.CARD_UPDATER_APP_ID }}
          private-key: ${{ secrets.CARD_UPDATER_PRIVATE_KEY }}

      - name: Generate stats card (dark) - ${{ env.DARK_CARD }}
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=react
          path: ${{ env.DARK_CARD }}
          token: ${{ steps.credentials.outputs.token }}

      - name: Generate stats card (light) - ${{ env.LIGHT_CARD }}
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=default
          path: ${{ env.LIGHT_CARD }}
          token: ${{ steps.credentials.outputs.token }}

      - name: Validate generated cards
        # github-readme-stats does not fail on API errors (e.g. rate limits);
        # instead it writes a valid SVG whose text reads "Something went wrong!".
        # Fail here so a broken card is never committed, opened as a PR, or auto-merged.
        env:
          CARDS: '${{ env.DARK_CARD }} ${{ env.LIGHT_CARD }}'
        run: |
          status=0
          for card in $CARDS; do
            if [ ! -s "$card" ]; then
              echo "::error file=$card::Card is missing or empty"
              status=1
            elif grep -qF 'Something went wrong' "$card"; then
              echo "::error file=$card::Card contains an error placeholder (likely an API rate limit)"
              grep -oE 'Resource limits[^<]*|Something went wrong[^<]*' "$card" | head -n1
              status=1
            fi
          done
          exit $status

      - name: Create Pull Request
        id: create_pr
        # zizmor: ignore[superfluous-actions] -- this action also handles git commit and branch push, not just PR creation
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.credentials.outputs.token }}
          branch: update-profile-cards
          title: ${{ env.COMMIT_MESSAGE }}
          commit-message: ${{ env.COMMIT_MESSAGE }}
          body: |
            Scheduled cards update

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          author: ${{ env.AUTHOR }}
          committer: ${{ env.AUTHOR }}
          sign-commits: true
          delete-branch: true # avoid multiple PRs
        env:
          COMMIT_MESSAGE: 'feat: update README cards'
          AUTHOR: ${{ steps.credentials.outputs.bot-name }} <${{ steps.credentials.outputs.bot-email }}>

      - name: Enable auto-merge
        if: ${{ steps.create_pr.outputs.pull-request-number }} # PR might not being opened
        run: gh pr merge --squash --auto "${PULL_REQUEST_NUMBER}"
        env:
          GH_TOKEN: ${{ steps.credentials.outputs.token }}
          PULL_REQUEST_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
